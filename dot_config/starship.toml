"$schema" = 'https://starship.rs/config-schema.json'

# Synthwave prompt вҖ” gruvbox-rainbow style (seamless powerline arrows, round
# end caps), conservative info set, neon palette. Glyphs generated by codepoint.
#
# Spine: OS -> distrobox пҶІ -> directory   (OS purple, distrobox pink)
# Context: git оӮ  -> nix пҢ“  (arrows in format string, gruvbox-style;
#   non-repo dirs leave a small trailing wedge, as gruvbox-rainbow does).
# Distrobox owns its purple->pink and pink->violet arrows, so when absent (on
# the host) OS(purple) simply abuts directory(violet) вҖ” no orphaned separator.
# Right side: cmd duration + time as self-contained pills.

format = """
[оӮ¶](fg:purple)\
[ $os ](bg:purple fg:ink)\
$container\
[ $directory ](bg:violet fg:text)\
[оӮ°](fg:violet bg:cyan)\
$git_branch\
$git_status\
[оӮ°](fg:cyan bg:mint)\
$nix_shell\
[оӮҙ](fg:mint)\
$fill\
$cmd_duration\
$time\
$line_break\
$character"""

palette = "synthwave"

[palettes.synthwave]
text   = "#f7f7fb"
ink    = "#1b1024"
pink   = "#f92aad"
purple = "#a44cf6"
violet = "#7b5cff"
cyan   = "#25e1ed"
mint   = "#5af2c0"
red    = "#fe4450"
panel  = "#2a2139"

# в”Җв”Җ OS icon (FIRST; purple, round start cap) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[os]
disabled = false
format = "$symbol"

[os.symbols]
Fedora = "у°Јӣ"
Linux = "у°ҢҪ"
Macos = "у°Җө"
Ubuntu = "у°•Ҳ"
Arch = "у°ЈҮ"
Debian = "у°Јҡ"
Windows = "у°ҚІ"
NixOS = "пҢ“"

# в”Җв”Җ Distrobox / container (SECOND; pink; only inside a container) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
# Owns its leading (purple->pink) and trailing (pink->violet) arrows so the
# unit appears/vanishes cleanly.
[container]
disabled = false
format = "[оӮ°](fg:purple bg:pink)[ пҶІ $name ](bg:pink fg:ink)[оӮ°](fg:pink bg:violet)"

# в”Җв”Җ Directory (always; violet) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[directory]
style = "fg:text bg:violet"
format = "$path$read_only"
read_only = " ro"
truncation_length = 3
truncation_symbol = "вҖҰ/"

# в”Җв”Җ Git branch (cyan) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[git_branch]
symbol = "оӮ "
format = "[ $symbol $branch ](bg:cyan fg:ink)"
truncation_length = 25

# в”Җв”Җ Git status (continues cyan; only when dirty) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[git_status]
format = "[ $all_status$ahead_behind ](bg:cyan fg:ink)"
conflicted = "="
ahead = "вҮЎ${count}"
behind = "вҮЈ${count}"
diverged = "вҮЎ${ahead_count}вҮЈ${behind_count}"
untracked = "?${count}"
stashed = "вүЎ${count}"
modified = "!${count}"
staged = "+${count}"
renamed = "В»${count}"
deleted = "вңҳ${count}"

# в”Җв”Җ Nix shell (mint) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[nix_shell]
heuristic = true
symbol = "пҢ“"
format = "[ $symbol $state ](bg:mint fg:ink)"

[fill]
symbol = " "

# в”Җв”Җ Command duration (right; self-contained panel pill, >500ms) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[cmd_duration]
min_time = 500
format = "[оӮІ](fg:panel)[ пү’ $duration ](bg:panel fg:text)[оӮҙ](fg:panel)"

# в”Җв”Җ Time (right edge; self-contained pink pill) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[time]
disabled = false
time_format = "%H:%M:%S"
format = "[оӮІ](fg:pink)[ пҖ— $time ](bg:pink fg:ink)[оӮҙ](fg:pink)"

[character]
success_symbol = "[вқҜ](bold fg:pink)"
error_symbol = "[вқҜ](bold fg:red)"
vimcmd_symbol = "[вқ®](bold fg:cyan)"
