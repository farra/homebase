# Starship prompt configuration
# Two-line layout inspired by quick-term oh-my-posh theme
#
# ╭─ ~/dev/homebase  main *+1  nix              3s 14:23:45
# ╰─ ❯

format = """
[╭─](dimmed white) \
$directory\
$git_branch\
$git_status\
$nix_shell\
$fill\
$cmd_duration\
$time
[╰─](dimmed white) \
$character"""

# ── Prompt character ─────────────────────────────────────────────────────
[character]
success_symbol = "[❯](bold #d75f00)"
error_symbol = "[❯](bold red)"

# ── Fill (space between left and right) ──────────────────────────────────
[fill]
symbol = " "

# ── Directory ────────────────────────────────────────────────────────────
[directory]
style = "bold #0087af"
read_only = " 󰌾"
truncation_length = 3
truncation_symbol = "…/"

# ── Git ──────────────────────────────────────────────────────────────────
[git_branch]
symbol = " "
style = "bold #378504"
truncation_length = 25
truncation_symbol = "…"

[git_status]
style = "bold #a97400"

[git_commit]
tag_symbol = "  "

# ── Nix shell (heuristic needed for nix develop) ────────────────────────
[nix_shell]
heuristic = true
symbol = " "
format = " via [$symbol$state]($style)"
style = "bold #7eb8da"
unknown_msg = "nix"

# ── Right side ───────────────────────────────────────────────────────────
[cmd_duration]
min_time = 2000
style = "#585858"
format = " [$duration]($style)"

[time]
disabled = false
style = "bold #d75f00"
format = " [$time]($style)"
time_format = "%H:%M:%S"

# ── Nerd Font Symbols ───────────────────────────────────────────────────
